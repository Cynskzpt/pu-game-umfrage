<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formular aktivieren</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: Outfit, system-ui, sans-serif;
      background: #0a0a0f;
      color: #f4f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .box {
      max-width: 420px;
      line-height: 1.55;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { color: #9b9bb8; }
    a { color: #00f5d4; }
  </style>
</head>
<body>
  <div class="box">
    <h1>📬 Aktivierungs-Mail wird angefordert…</h1>
    <p id="status">Einen Moment — FormSubmit wird geöffnet.</p>
    <p style="margin-top:1.5rem"><a href="index.html">← Zurück zur Umfrage</a></p>
  </div>

  <form id="activate" action="https://formsubmit.co/cynthiacavaleiro2011@outlook.com" method="POST" style="display:none">
    <input type="hidden" name="_subject" value="PU Umfrage aktivieren" />
    <input type="hidden" name="_captcha" value="false" />
    <input type="hidden" name="_template" value="table" />
    <input type="hidden" name="Hinweis" value="Bitte auf den Aktivierungslink in der nächsten Mail klicken." />
    <input type="hidden" name="_next" value="https://cynskzpt.github.io/pu-game-umfrage/aktivieren.html?done=1" />
  </form>

  <script>
    const params = new URLSearchParams(location.search);
    if (params.get("done") === "1") {
      document.getElementById("status").innerHTML =
        "Fertig. Schau in <strong>Outlook</strong> (auch Junk/Spam) nach einer Mail von <strong>FormSubmit</strong> und klicke <strong>Activate Form</strong>.";
    } else {
      document.getElementById("activate").submit();
    }
  </script>
</body>
</html>
